<!DOCTYPE html>

<head>

    <style>
        :root { --primary: #00fbff; --bg: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #1a1a1a; height: 100vh; border-right: 2px solid var(--primary); padding: 20px; box-sizing: border-box; }
        .main { flex: 1; padding: 40px; }
        .card { background: #222; padding: 20px; border-radius: 10px; border-left: 5px solid var(--primary); margin-bottom: 20px; }
        .status-on { color: #00ff22; text-shadow: 0 0 10px #00ff22; font-weight: bold; }
        .btn-invite { background: var(--primary); color: black; padding: 12px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; text-decoration: none; display: block; text-align: center; }
    </style>
</head>
<body>

        <hr style="border-color: #333;">

    </div>
    <div class="main">

        <div class="card">

        <div class="card">

</html>
